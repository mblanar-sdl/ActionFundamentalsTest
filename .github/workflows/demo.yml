name: CI demo

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        type: environment
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Build completed"

  test:
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.environment == 'test'
    environment: test
    steps:
      - run: echo "🧪 Running tests..."

  qa:
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.environment == 'qa'
    environment: qa
    steps:
      - run: |
          echo "🧪 Running QA tests..."
          sleep 15

  dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.environment == 'dev'
    environment: dev
    steps:
      - run: echo "🚀 Deploying to Dev"

  prod:
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.environment == 'prod'
    environment:
      name: prod
      url: https://writeabout.net
    steps:
      - run: |
          echo "🚀 Step 1..."
          sleep 10
      - run: |
          echo "🚀 Step 2..."
          sleep 10
      - run: |
          echo "🚀 Step 3..."
          sleep 10
      - run: |
          echo "🚀 Step 4..."
          sleep 10
      - run: |
          echo "🚀 Step 5..."
          sleep 10
